name: Debug Build (No Secrets Required)

on:
  workflow_dispatch:        # 手动触发
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create placeholder google-services.json
        run: |
          cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-project",
              "storage_bucket": "placeholder-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "PLACEHOLDER_API_KEY"
                  }
                ],
                "services": {
                  "analytics_service": {
                    "status": 2
                  },
                  "appinvite_service": {
                    "status": 2
                  },
                  "ads_service": {
                    "status": 2
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          echo "✅ Placeholder google-services.json created"

      - name: Patch out Firebase Crashlytics for Debug build
        run: |
          # 确保 Debug 构建不因 Firebase 初始化失败而崩溃
          echo "✅ Ready for Debug build (Firebase services will be disabled)"

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --build-cache --parallel
        env:
          CI: true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: rikkahub-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          compression-level: 0
          if-no-files-found: error

      - name: Upload Build Reports (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            build/reports/
          retention-days: 7
